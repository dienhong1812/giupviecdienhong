<!-- NÚT ADMIN -->

<button onclick="openLogin()" style="
position:fixed;
left:20px;
bottom:20px;
background:#222;
color:white;
padding:12px 20px;
border:none;
border-radius:50px;
font-weight:bold;
cursor:pointer;
z-index:9999;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
">

⚙️ ADMIN

</button>

<!-- FORM LOGIN -->

<div id="adminLogin" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:35px;
border-radius:20px;
width:360px;
max-width:90%;
z-index:10000;
box-shadow:0 10px 35px rgba(0,0,0,0.3);
">

<h2 style="
text-align:center;
margin-bottom:25px;
color:#007b8f;
">

🔐 Đăng nhập quản trị

</h2>

<input
type="text"
id="username"
placeholder="Tên đăng nhập"

style="
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
">

<input
type="password"
id="password"
placeholder="Mật khẩu"

style="
width:100%;
padding:14px;
margin-bottom:20px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
">

<button onclick="loginAdmin()" style="
width:100%;
padding:15px;
background:linear-gradient(90deg,#007b8f,#00bcd4);
color:white;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer;
">

ĐĂNG NHẬP

</button>

<p id="loginMsg" style="
margin-top:15px;
text-align:center;
color:red;
font-weight:bold;
"></p>

<button onclick="closeLogin()" style="
margin-top:15px;
width:100%;
padding:12px;
background:#eee;
border:none;
border-radius:10px;
cursor:pointer;
">

Đóng

</button>

</div>

<!-- NÚT LƯU -->

<button id="saveBtn" onclick="saveContent()" style="
display:none;
position:fixed;
left:20px;
bottom:80px;
background:red;
color:white;
padding:14px 20px;
border:none;
border-radius:50px;
font-weight:bold;
cursor:pointer;
z-index:9999;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
">

💾 LƯU NỘI DUNG

</button>

<script>

/* MỞ LOGIN */

function openLogin(){

document.getElementById("adminLogin").style.display="block";

}

/* ĐÓNG LOGIN */

function closeLogin(){

document.getElementById("adminLogin").style.display="none";

}

/* ĐĂNG NHẬP */

function loginAdmin(){

let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;

if(user==="admin" && pass==="Tuyet123456"){

alert("Đăng nhập thành công!");

document.getElementById("adminLogin").style.display="none";

/* CHO PHÉP SỬA */

document.body.contentEditable=true;

document.body.style.outline="4px dashed red";

/* HIỆN NÚT LƯU */

document.getElementById("saveBtn").style.display="block";

alert("Bạn có thể sửa trực tiếp nội dung trên website");

}else{

document.getElementById("loginMsg").innerHTML="Sai tài khoản hoặc mật khẩu";

}

}

/* LƯU */

function saveContent(){

localStorage.setItem("websiteContent",document.body.innerHTML);

alert("Đã lưu nội dung trên trình duyệt");

}

/* LOAD */

window.onload=function(){

let saved=localStorage.getItem("websiteContent");

if(saved){

document.body.innerHTML=saved;

}

}

</script>
