# blog.html hoàn chỉnh

```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Giúp Việc Diên Hồng</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Roboto,sans-serif;background:#f4f6f9;color:#222}
header{height:230px;background:url('https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1600') center/cover;position:relative}
header:after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.5)}
.header-content{position:relative;z-index:2;text-align:center;padding-top:75px;color:#fff}
.header-content h1{font-size:42px;margin-bottom:10px}
.header-content p{font-size:20px}
nav{background:#fff;padding:16px;text-align:center;position:sticky;top:0;z-index:999;box-shadow:0 2px 10px rgba(0,0,0,.08)}
nav a{text-decoration:none;color:#007b8f;margin:0 15px;font-weight:700}
.container{max-width:1200px;margin:auto;padding:30px 20px}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:25px}
.blog-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,.08)}
.blog-card img{width:100%;height:240px;object-fit:cover;display:block}
.blog-content{padding:22px}
.blog-content h2{font-size:24px;color:#007b8f;margin-bottom:15px}
.blog-content p{line-height:1.8;font-size:17px;margin-bottom:15px}
.full-content{display:none;margin-top:10px}
.readmore,.save-btn,.delete-btn,.edit-btn{border:none;padding:11px 18px;border-radius:10px;font-weight:700;cursor:pointer;color:#fff;margin-top:10px}
.readmore{background:#007b8f}
.save-btn{background:#28a745;display:none}
.delete-btn{background:red;display:none}
.edit-btn{background:#ff9800;display:none}
.upload-box{display:none;margin-top:15px}
.upload-box input{width:100%}
.admin-btn,.add-post-btn{position:fixed;left:20px;color:#fff;border:none;border-radius:50px;padding:15px 24px;font-weight:700;cursor:pointer;z-index:9999}
.admin-btn{bottom:20px;background:#111}
.add-post-btn{bottom:90px;background:#007b8f;display:none}
.call-btn{position:fixed;right:20px;bottom:20px;background:red;color:#fff;text-decoration:none;padding:18px 28px;border-radius:50px;font-size:22px;font-weight:700;z-index:9999}
.login-box{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:99999}
.login-content{background:#fff;padding:30px;border-radius:20px;width:90%;max-width:380px}
.login-content h2{margin-bottom:20px;color:#007b8f}
.login-content input{width:100%;padding:14px;margin-bottom:15px;border:1px solid #ddd;border-radius:10px}
.login-content button{width:100%;padding:15px;background:#007b8f;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer}
@media(max-width:768px){.header-content h1{font-size:30px}}
</style>
</head>
<body>

<header>
<div class="header-content">
<h1>Blog Giúp Việc Diên Hồng</h1>
<p>Kinh nghiệm giúp việc - chăm trẻ - chăm người già tại Hà Nội</p>
</div>
</header>

<nav>
<a href="#">Trang chủ</a>
<a href="#">Giúp việc</a>
<a href="#">Chăm trẻ</a>
<a href="#">Người già</a>
<a href="#">Liên hệ</a>
</nav>

<div class="container">
<div class="blog-grid" id="blogGrid"></div>
</div>

<button class="admin-btn" onclick="openLogin()">⚙ ADMIN</button>
<button class="add-post-btn" id="addBtn" onclick="addPost()">➕ Thêm bài viết</button>

<div class="login-box" id="loginBox">
<div class="login-content">
<h2>Đăng nhập quản trị</h2>
<input type="text" id="username" placeholder="Tên đăng nhập">
<input type="password" id="password" placeholder="Mật khẩu">
<button onclick="loginAdmin()">Đăng nhập</button>
</div>
</div>

<a href="tel:0343958091" class="call-btn">📞 GỌI NGAY</a>

<script>

let isAdmin=false;

let posts = JSON.parse(localStorage.getItem('dienhong_posts')) || [
{
image:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200',
title:'5 kinh nghiệm thuê giúp việc uy tín tại Hà Nội',
desc:'Nên chọn người có kinh nghiệm, lý lịch rõ ràng và có trung tâm bảo đảm.',
full:'Khi thuê giúp việc nên ưu tiên người có giấy tờ rõ ràng, đã từng làm việc lâu năm và có đánh giá tốt.'
}
];

function savePosts(){
localStorage.setItem('dienhong_posts',JSON.stringify(posts));
}

function renderPosts(){

const grid=document.getElementById('blogGrid');
grid.innerHTML='';

posts.forEach((post,index)=>{

grid.innerHTML += `
<div class="blog-card">
<img src="${post.image}">
<div class="blog-content">
<h2 ${isAdmin?'contenteditable="true"':''} oninput="updateField(${index},'title',this.innerText)">${post.title}</h2>
<p ${isAdmin?'contenteditable="true"':''} oninput="updateField(${index},'desc',this.innerText)">${post.desc}</p>
<div class="full-content" id="full-${index}">
<p ${isAdmin?'contenteditable="true"':''} oninput="updateField(${index},'full',this.innerText)">${post.full}</p>
</div>
<button class="readmore" onclick="toggleRead(${index},this)">Đọc tiếp</button>

${isAdmin ? `
<br>
<button class="save-btn" style="display:inline-block" onclick="saveAll()">Lưu bài</button>
<button class="delete-btn" style="display:inline-block" onclick="deletePost(${index})">Xóa bài</button>
<div class="upload-box" style="display:block">
<input type="file" accept="image/*" onchange="changeImage(event,${index})">
</div>
` : ''}

</div>
</div>
`;

});
}

function toggleRead(index,btn){
const full=document.getElementById('full-'+index);
if(full.style.display==='block'){
full.style.display='none';
btn.innerText='Đọc tiếp';
}else{
full.style.display='block';
btn.innerText='Thu gọn';
}
}

function openLogin(){
document.getElementById('loginBox').style.display='flex';
}

function loginAdmin(){
const user=document.getElementById('username').value;
const pass=document.getElementById('password').value;

if(user==='admin' && pass==='Tuyet123456'){
isAdmin=true;
document.getElementById('loginBox').style.display='none';
document.getElementById('addBtn').style.display='block';
alert('Đăng nhập thành công');
renderPosts();
}else{
alert('Sai tài khoản hoặc mật khẩu');
}
}

function updateField(index,key,value){
posts[index][key]=value;
}

function saveAll(){
savePosts();
alert('Đã lưu bài viết');
}

function deletePost(index){
if(confirm('Xóa bài viết này?')){
posts.splice(index,1);
savePosts();
renderPosts();
}
}

function addPost(){
posts.unshift({
image:'https://images.unsplash.com/photo-1521791136064-7986c2920216?q=80&w=1200',
title:'Tiêu đề bài viết mới',
desc:'Mô tả ngắn bài viết...',
full:'Nội dung đầy đủ bài viết...'
});

savePosts();
renderPosts();
}

function changeImage(event,index){
const file=event.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(e){
posts[index].image=e.target.result;
savePosts();
renderPosts();
alert('Đã thay ảnh thành công');
}

reader.readAsDataURL(file);
}

renderPosts();

</script>

</body>
</html>
```
